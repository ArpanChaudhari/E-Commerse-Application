<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="CSS/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="Images/logo-ShopEase.png" class="logo-ShopEase">
        </div>

        <div class="header-actions">
            <button class="header-btn">
                ← Continue Shopping
            </button>
        </div>
    </header>

    <!-- CART PAGE -->
    <main class="cart-page">
        <div class="cart-container">

            <div class="drawer-header">
                <div>
                    <div class="drawer-title">Your Cart</div>
                    <div class="drawer-subtitle" id="cartSubtitle">0 items</div>
                </div>
            </div>

            <div class="drawer-body">

                <div id="cartItems"></div>

                <div id="cartEmpty" class="empty-state" hidden>
                    <div class="empty-title">Your cart is empty</div>
                    <div class="empty-subtitle">
                        Add something you like from the product list.
                    </div>
                </div>

            </div>

            <div class="drawer-footer">
                <div class="totals">
                    <span>Total</span>
                    <strong id="totalAmount">₹0.00</strong>
                </div>

                <div class="drawer-actions">
                    <button class="btn-clear" id="clearCart" disabled>
                        Clear Cart
                    </button>

                    <button class="btn-checkout" id="checkOut" disabled>
                        Check Out
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- ✅ TEMPLATE -->
    <template id="cartItemTemplate">
        <div class="cart-item">
            <div class="cart-item-grid">

                <div class="cart-item-image">
                    <img class="item-image" src="" alt="">
                </div>

                <div class="cart-item-content">
                    <div class="cart-item-content-rowOne">
                        <div class="cart-item-content-rowOne-left">
                            <h3 class="cart-item-name"></h3>
                            <span class="cart-item-category"></span>
                        </div>

                        <div class="cart-item-content-rowOne-right">
                            <button class="cart-item-remove">Remove</button>
                        </div>
                    </div>

                    <div class="cart-item-content-rowTwo">
                        <div class="cart-item-content-rowTwo-left">
                            <button class="cart-item-Plus">+</button>
                            <span class="cart-item-totalItem"></span>
                            <button class="cart-item-Minus">-</button>
                        </div>

                        <div class="cart-item-content-rowTwo-right">
                            <span class="cart-item-totalPrice"></span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </template>

    <!-- JS -->
    <script type="module" src="Js/cart.js"></script>

</body>
</html>
